<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FIREFIGHT URCW</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#060f06;overflow:hidden;font-family:'Share Tech Mono','Courier New',monospace;color:#c8d8c8;}
    #gc{position:relative;width:100%;height:100%;touch-action:none;}
    canvas{display:block;}

    /* ===== LOBBY ===== */
    #lobby{position:fixed;inset:0;background:#060f06;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:600;padding:20px;}
    #lobby.hidden{display:none;}
    .l-title{font-size:30px;font-family:'Rajdhani',sans-serif;font-weight:700;color:#4aff4a;letter-spacing:5px;text-shadow:0 0 24px #4aff4a44;text-align:center;}
    .l-sub{font-size:10px;color:#3a5a3a;letter-spacing:3px;margin-bottom:28px;text-align:center;}
    .l-block{width:100%;max-width:300px;margin-bottom:16px;}
    .l-label{font-size:10px;color:#3a6a3a;letter-spacing:2px;margin-bottom:6px;}
    .fsrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .fbtn{padding:13px;border:2px solid #2a2a2a;background:#0a120a;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;transition:.2s;text-align:center;}
    .fbtn.ua{color:#4a9eff;} .fbtn.ua.sel{border-color:#4a9eff;background:#0a1a3a;box-shadow:0 0 12px #4a9eff33;}
    .fbtn.ru{color:#ff5555;} .fbtn.ru.sel{border-color:#ff5555;background:#3a0a0a;box-shadow:0 0 12px #ff555533;}
    .rinput{width:100%;padding:10px 12px;background:#040a04;border:1px solid #2a3a2a;color:#c8d8c8;font-family:'Share Tech Mono',monospace;font-size:18px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
    .rinput:focus{outline:none;border-color:#4aff4a;}
    .lbtn{width:100%;padding:12px;background:#0d260d;border:1px solid #4aff4a;color:#4aff4a;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;transition:.2s;}
    .lbtn:active{background:#1a3a1a;}
    .lbtn.sec{background:#0a0a0a;border-color:#3a3a3a;color:#666;}
    .div{width:100%;border:none;border-top:1px solid #1a2a1a;margin:8px 0 14px;}
    .rcode{font-size:30px;color:#4aff4a;letter-spacing:8px;font-family:'Rajdhani',sans-serif;font-weight:700;text-align:center;padding:12px;border:1px solid #1a3a1a;background:#040d04;}
    .wait{color:#2a5a2a;font-size:11px;text-align:center;letter-spacing:2px;animation:blink 1.2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ===== HUD TOP ===== */
    #hud{position:fixed;top:0;left:0;right:0;height:46px;background:rgba(4,10,4,.88);border-bottom:1px solid #1a3a1a;display:none;align-items:center;justify-content:space-between;padding:0 10px;z-index:200;backdrop-filter:blur(4px);}
    #faction-lbl{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;}
    .ua-c{color:#4a9eff;} .ru-c{color:#ff5555;}
    #turn-num{font-size:11px;color:#4a6a4a;letter-spacing:1px;}
    #end-btn{padding:6px 13px;background:#0d260d;border:1px solid #2a6a2a;color:#3aff3a;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:1px;}
    #end-btn:active{background:#1a4a1a;}
    #end-btn.off{background:#0a0a0a;border-color:#2a2a2a;color:#2a2a2a;pointer-events:none;}

    /* ===== INFO PANEL ===== */
    #info{position:fixed;bottom:0;left:0;right:0;height:82px;background:rgba(4,10,4,.9);border-top:1px solid #1a3a1a;display:none;align-items:center;padding:8px 10px;gap:10px;z-index:200;backdrop-filter:blur(4px);}
    #uname{font-size:14px;font-weight:700;color:#ddeedd;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
    #ustats{font-size:10px;color:#4a7a4a;margin-top:2px;}
    #uhpbar{width:100%;height:5px;background:#0a0a0a;border-radius:3px;margin-top:5px;overflow:hidden;}
    #uhpfill{height:100%;background:#3aff3a;border-radius:3px;transition:width .3s;}
    #uap{font-size:10px;color:#ffaa3a;margin-top:3px;}
    #actbtns{display:flex;flex-direction:column;gap:4px;margin-left:auto;min-width:90px;}
    .abtn{padding:5px 10px;border:1px solid;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;}
    .mbtn{background:#0a1a3a;color:#4a9eff;border-color:#4a9eff;}
    .atbtn{background:#2a0a0a;color:#ff5555;border-color:#ff5555;}
    .abtn.off{opacity:.25;pointer-events:none;}
    .abtn:active{opacity:.6;}

    /* ===== STATUS ===== */
    #smsg{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:rgba(4,10,4,.9);border:1px solid #2a4a2a;padding:5px 14px;font-size:11px;letter-spacing:1px;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
    #smsg.on{opacity:1;}

    /* ===== COMBAT POPUP ===== */
    #cpop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(4,6,4,.96);border:1px solid #ff6600;padding:18px 26px;z-index:400;text-align:center;display:none;}
    #cpop.on{display:block;animation:fadein .15s;}
    @keyframes fadein{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    #cr{font-size:22px;color:#ff6600;font-family:'Rajdhani',sans-serif;font-weight:700;}
    #cd{font-size:10px;color:#6a6a6a;margin-top:6px;max-width:240px;}

    /* ===== VICTORY ===== */
    #vwin{position:fixed;inset:0;background:rgba(2,4,2,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;}
    #vwin.on{display:flex;}
    #vtitle{font-size:40px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:5px;}
    #vsub{font-size:12px;color:#4a6a4a;margin-top:8px;letter-spacing:3px;}
    .play-again{margin-top:28px;padding:11px 32px;background:#0d260d;border:1px solid #3aff3a;color:#3aff3a;font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;cursor:pointer;}

    /* ===== PHASE BADGE ===== */
    #pbadge{position:fixed;top:52px;right:8px;background:rgba(4,10,4,.85);border:1px solid #2a4a2a;padding:4px 8px;font-size:10px;letter-spacing:1px;color:#4a7a4a;z-index:200;display:none;}
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="l-title">FIREFIGHT URCW</div>
  <div class="l-sub">UKRAINE CONFLICT WARGAME • MOBILE v1.0</div>

  <div class="l-block" id="step-f">
    <div class="l-label">1 — CHOISIR FACTION</div>
    <div class="fsrow">
      <div class="fbtn ua" id="btn-ua" onclick="selFac('UA')">🇺🇦 UKRAINE</div>
      <div class="fbtn ru" id="btn-ru" onclick="selFac('RU')">🇷🇺 RUSSIE</div>
    </div>
  </div>

  <div class="l-block" id="step-r">
    <div class="l-label">2 — CRÉER UNE PARTIE</div>
    <button class="lbtn" onclick="createRoom()">▶ CRÉER SALLE</button>
    <hr class="div">
    <div class="l-label">OU REJOINDRE</div>
    <input class="rinput" id="room-inp" placeholder="CODE (6 CAR.)" maxlength="6">
    <button class="lbtn sec" onclick="joinRoom()">→ REJOINDRE</button>
  </div>

  <div class="l-block" id="step-w" style="display:none">
    <div class="l-label">CODE DE LA SALLE</div>
    <div class="rcode" id="rcode">------</div>
    <br>
    <div class="wait" id="wtxt">EN ATTENTE D'UN ADVERSAIRE...</div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="faction-lbl">--</div>
  <div id="turn-num">TOUR 1</div>
  <button id="end-btn" onclick="endTurn()" class="off">FIN TOUR</button>
</div>

<div id="gc"><canvas id="cvs"></canvas></div>

<!-- INFO PANEL -->
<div id="info">
  <div style="flex:1;min-width:0">
    <div id="uname">—</div>
    <div id="ustats">Sélectionner une unité</div>
    <div id="uhpbar"><div id="uhpfill" style="width:100%"></div></div>
    <div id="uap">PA: —</div>
  </div>
  <div id="actbtns">
    <button class="abtn mbtn off" id="bmove" onclick="setPhase('MOVE')">◈ DÉPLACER</button>
    <button class="abtn atbtn off" id="batk" onclick="setPhase('ATTACK')">⊕ ATTAQUER</button>
  </div>
</div>

<div id="smsg"></div>
<div id="cpop"><div id="cr"></div><div id="cd"></div></div>
<div id="vwin"><div id="vtitle"></div><div id="vsub"></div><button class="play-again" onclick="location.reload()">↺ NOUVELLE PARTIE</button></div>
<div id="pbadge"></div>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

// ============================================================

// ============================================================
let pickedFac = null;

function selFac(f){
  pickedFac=f;
  document.getElementById('btn-ua').classList.toggle('sel',f==='UA');
  document.getElementById('btn-ru').classList.toggle('sel',f==='RU');
}

function rndCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ2345679';
  let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)];
  return s;
}

async function createRoom(){
  if(!pickedFac){showMsg('Choisir une faction!');return;}
  G.myFac=pickedFac; G.oppFac=pickedFac==='UA'?'RU':'UA';
  G.myRole='host'; G.room=rndCode();
  show('step-r',false); show('step-f',false); show('step-w',true);
  document.getElementById('rcode').textContent=G.room;
  document.getElementById('wtxt').textContent='EN ATTENTE D\'UN ADVERSAIRE...';
  await initAbly(G.room);
  ch.subscribe('join_ack',()=>{ ch.publish('game_start',{hf:G.myFac,gf:G.oppFac}); startGame(); });
}

async function joinRoom(){
  if(!pickedFac){showMsg('Choisir une faction!');return;}
  const code=document.getElementById('room-inp').value.trim().toUpperCase();
  if(code.length!==6){showMsg('Code à 6 caractères!');return;}
  G.room=code; G.myRole='guest';
  show('step-r',false); show('step-f',false); show('step-w',true);
  document.getElementById('rcode').textContent=code;
  document.getElementById('wtxt').textContent='CONNEXION...';
  await initAbly(code);
  ch.subscribe('game_start',msg=>{
    const d=msg.data; G.myFac=d.gf; G.oppFac=d.hf;
    ch.publish('join_ack',{});
    startGame();
  });
  ch.publish('ping',{});
}

function show(id,v){ const el=document.getElementById(id); if(el) el.style.display=v?'':'none'; }

// ============================================================
// ABLY
// ============================================================
async function initAbly(room){
  abl=new Ably.Realtime({key:ABLY_KEY});
  ch=abl.channels.get('FFURCW_'+room);
  ch.subscribe('remote_move',onRMove);
  ch.subscribe('remote_atk',onRAtk);
  ch.subscribe('remote_end',onREnd);
  return new Promise(r=>abl.connection.once('connected',r));
}

// ============================================================
// START GAME
// ============================================================
function startGame(){
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('info').style.display='flex';
  document.getElementById('pbadge').style.display='block';
  initCanvas(); spawnUnits();
  G.curTurn='UA'; G.myTurn=(G.myFac==='UA');
  updateHUD(); render();
}

// ============================================================
// CANVAS
// ============================================================
function initCanvas(){
  cvs=document.getElementById('cvs');
  const gc=document.getElementById('gc');
  cvs.width=gc.clientWidth; cvs.height=gc.clientHeight;
  ctx=cvs.getContext('2d');
  // Centre la carte
  const mw=GW*TW, mh=GH*TH;
  camX=Math.max(0,(cvs.width-mw)/2);
  camY=Math.max(0,(cvs.height-mh)/2)+46;
  // Sprites
  for(const[k,v] of Object.entries(SPR)){
    const img=new Image(); img.src=v; sprImgs[k]=img;
  }
  bakeTerrainTiles();
  cvs.addEventListener('click',onTap);
  cvs.addEventListener('touchend',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    const fake={clientX:t.clientX,clientY:t.clientY};
    onTap(fake);
  });
}

function bakeTerrainTiles(){
  for(const[key,col] of Object.entries(TC)){
    const oc=document.createElement('canvas'); oc.width=TW; oc.height=TH;
    const ox=oc.getContext('2d');
    ox.fillStyle=col; ox.fillRect(0,0,TW,TH);
    // Détails
    if(key==='G'){
      ox.globalAlpha=.12;
      for(let i=0;i<18;i++){
        ox.fillStyle=Math.random()>.5?'#2d5528':'#4a7a3d';
        ox.fillRect(Math.random()*TW,Math.random()*TH,2,3);
      }
      ox.globalAlpha=1;
    } else if(key==='F'){
      for(let i=0;i<7;i++){
        const x=4+Math.random()*(TW-8), y=4+Math.random()*(TH-8);
        ox.fillStyle=i%2?'#1a3a1a':'#2a5020';
        ox.beginPath(); ox.arc(x,y,4+Math.random()*4,0,Math.PI*2); ox.fill();
      }
    } else if(key==='R'){
      ox.fillStyle='#6a6a5a'; ox.fillRect(0,0,TW,TH);
      ox.strokeStyle='#7a7a4a'; ox.lineWidth=1; ox.setLineDash([6,5]);
      ox.beginPath(); ox.moveTo(TW/2,0); ox.lineTo(TW/2,TH); ox.stroke();
      ox.setLineDash([]);
    } else if(key==='B'){
      ox.fillStyle='#8a7355'; ox.fillRect(6,6,TW-12,TH-12);
      ox.strokeStyle='#3a2a10'; ox.lineWidth=1; ox.strokeRect(6,6,TW-12,TH-12);
      ox.fillStyle='#1a1a2a';
      ox.fillRect(10,10,8,8); ox.fillRect(TW-18,10,8,8);
      ox.fillRect(10,TH-18,8,8); ox.fillRect(TW-18,TH-18,8,8);
    } else if(key==='T'){
      ox.fillStyle='#3e2810'; ox.fillRect(6,TH*.35,TW-12,TH*.3);
      ox.strokeStyle='#2a1a08'; ox.lineWidth=1; ox.strokeRect(6,TH*.35,TW-12,TH*.3);
    } else if(key==='W'){
      for(let y=6;y<TH;y+=10){
        ox.strokeStyle='#3a7aaf'; ox.lineWidth=1.5; ox.globalAlpha=.5;
        ox.beginPath(); ox.moveTo(0,y);
        for(let x=0;x<TW;x+=8) ox.quadraticCurveTo(x+4,y-3,x+8,y);
        ox.stroke(); ox.globalAlpha=1;
      }
    } else if(key==='O'){
      ox.fillStyle='#aa7700';
      ox.fillRect(TW/2-2,8,4,TH-16);
      ox.fillStyle='#ffcc00';
      ox.fillRect(TW/2+2,10,12,9);
      ox.strokeStyle='#ffdd44'; ox.lineWidth=1.5;
      ox.strokeRect(2,2,TW-4,TH-4);
    }
    ox.strokeStyle='rgba(0,0,0,.25)'; ox.lineWidth=.5; ox.strokeRect(0,0,TW,TH);
    tileImgs[key]=oc;
  }
}

// ============================================================
// RENDER LOOP
// ============================================================
function render(){
  if(!ctx){requestAnimationFrame(render);return;}
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.fillStyle='#060f06'; ctx.fillRect(0,0,cvs.width,cvs.height);

  // Tuiles terrain
  for(let row=0;row<GH;row++){
    for(let col=0;col<GW;col++){
      const k=MAP[row]?.[col]||'G';
      ctx.drawImage(tileImgs[k]||tileImgs['G'], camX+col*TW, camY+row*TH);
    }
  }

  // Highlights
  for(const h of G.hilights){
    const px=camX+h.col*TW, py=camY+h.row*TH;
    if(h.t==='move'){
      ctx.fillStyle='rgba(20,80,255,.28)';
      ctx.fillRect(px,py,TW,TH);
      ctx.strokeStyle='#3a80ff'; ctx.lineWidth=1.5;
      ctx.strokeRect(px+1,py+1,TW-2,TH-2);
    } else {
      ctx.fillStyle='rgba(255,40,40,.32)';
      ctx.fillRect(px,py,TW,TH);
      ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.5;
      ctx.strokeRect(px+1,py+1,TW-2,TH-2);
    }
  }

  // Unités
  for(const u of G.units) if(u.alive) drawUnit(u);

  // Sélection
  if(G.selUnit&&G.selUnit.alive){
    const u=G.selUnit;
    const px=camX+u.col*TW, py=camY+u.row*TH;
    ctx.strokeStyle='#ffee00'; ctx.lineWidth=2;
    ctx.strokeRect(px+1,py+1,TW-2,TH-2);
  }

  requestAnimationFrame(render);
}

function drawUnit(u){
  const px=camX+u.col*TW, py=camY+u.row*TH;
  const isUA=u.fac==='UA';

  // Ombre
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(px+5,py+5,TW-10,TH-10);

  // Sprite ou fallback coloré
  const img=sprImgs[u.spr];
  if(img&&img.complete&&img.naturalWidth>0){
    ctx.drawImage(img,px+4,py+4,TW-8,TH-8);
  } else {
    ctx.fillStyle=isUA?'#0e244a':'#4a0e0e';
    ctx.fillRect(px+4,py+4,TW-8,TH-8);
    ctx.fillStyle=isUA?'#4a9eff':'#ff5555';
    ctx.font='bold 16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const ico=u.type.includes('9')||u.type.includes('7')?'▣':'▷';
    ctx.fillText(ico,px+TW/2,py+TH/2);
  }

  // Bordure faction
  ctx.strokeStyle=isUA?'#2a7aff':'#ff3333'; ctx.lineWidth=1.8;
  ctx.strokeRect(px+4,py+4,TW-8,TH-8);

  // HP bar
  const hp=u.hp/u.mhp;
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(px+2,py+TH-9,TW-4,5);
  ctx.fillStyle=hp>.6?'#3aff3a':hp>.3?'#ffaa00':'#ff3a3a';
  ctx.fillRect(px+2,py+TH-9,(TW-4)*hp,5);

  // AP dots
  const dotW=(TW-12)/(u.map-1||1);
  for(let i=0;i<u.map;i++){
    const dx=px+6+i*dotW;
    ctx.fillStyle=i<u.cap?'#ffcc00':'#1a1a1a';
    ctx.beginPath(); ctx.arc(dx,py+TH-14,2.2,0,Math.PI*2); ctx.fill();
  }

  // Épuisé
  if(u.cap<=0){
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(px+4,py+4,TW-8,TH-8);
  }
}

// ============================================================
// UNITÉS
// ============================================================
function spawnUnits(){
  G.units=[]; let id=0;
  for(const fac of ['UA','RU']){
    for(const sp of STARTS[fac]){
      const d=UDEFS[sp.type];
      G.units.push({
        id:id++, type:sp.type, fac:d.fac, name:d.name,
        col:sp.pos[0], row:sp.pos[1],
        hp:d.hp, mhp:d.hp,
        atk:d.atk, def:d.def, rng:d.rng, mov:d.mov,
        map:d.ap, cap:d.ap,  // maxAP, currentAP
        alive:true, spr:d.spr
      });
    }
  }
}

function unitAt(col,row){ return G.units.find(u=>u.alive&&u.col===col&&u.row===row); }

function terr(col,row){
  if(col<0||col>=GW||row<0||row>=GH)return null;
  return TERR[MAP[row]?.[col]||'G'];
}

// ============================================================
// INPUT
// ============================================================
function onTap(e){
  if(G.gameOver)return;
  if(!G.myTurn){showMsg('Pas votre tour!');return;}
  const r=cvs.getBoundingClientRect();
  const x=(e.clientX)-r.left, y=(e.clientY)-r.top;
  const col=Math.floor((x-camX)/TW), row=Math.floor((y-camY)/TH);
  if(col<0||col>=GW||row<0||row>=GH)return;
  handleClick(col,row);
}

function handleClick(col,row){
  const cu=unitAt(col,row);
  if(G.phase==='SELECT'){
    if(cu&&cu.fac===G.myFac) selUnit(cu);
  } else if(G.phase==='MOVE'){
    const hl=G.hilights.find(h=>h.col===col&&h.row===row&&h.t==='move');
    if(hl){
      doMove(G.selUnit,col,row);
    } else if(cu&&cu.fac===G.myFac){
      selUnit(cu);
    } else {
      G.phase='SELECT'; G.hilights=[]; G.selUnit=null; clearInfo();
    }
  } else if(G.phase==='ATTACK'){
    const hl=G.hilights.find(h=>h.col===col&&h.row===row&&h.t==='atk');
    if(hl){
      const tgt=unitAt(col,row); if(tgt) doAtk(G.selUnit,tgt);
    } else {
      G.phase='MOVE'; showMovRange(G.selUnit);
    }
  }
}

function setPhase(p){
  if(!G.selUnit||!G.myTurn)return;
  G.phase=p;
  if(p==='MOVE') showMovRange(G.selUnit);
  else showAtkRange(G.selUnit);
  document.getElementById('pbadge').textContent=p==='MOVE'?'MODE: DÉPLACEMENT':'MODE: ATTAQUE';
}

// ============================================================
// MOUVEMENT (BFS)
// ============================================================
function movCost(col,row){
  const t=terr(col,row);
  if(!t||t.mCost>=99)return 99;
  return Math.max(.5,t.mCost);
}

function selUnit(u){
  if(u.cap<=0){showMsg('Unité épuisée!');G.selUnit=u;G.hilights=[];G.phase='SELECT';updInfo(u);return;}
  G.selUnit=u; G.phase='MOVE';
  showMovRange(u); updInfo(u);
  document.getElementById('bmove').classList.remove('off');
  document.getElementById('batk').classList.remove('off');
  document.getElementById('pbadge').textContent='MODE: DÉPLACEMENT';
}

function showMovRange(u){
  G.hilights=[];
  const visited=new Map();
  const q=[{col:u.col,row:u.row,cost:0}];
  visited.set(`${u.col},${u.row}`,0);
  while(q.length){
    const {col,row,cost}=q.shift();
    for(const [dc,dr] of [[0,-1],[0,1],[-1,0],[1,0]]){
      const nc=col+dc,nr=row+dr;
      if(nc<0||nc>=GW||nr<0||nr>=GH)continue;
      if(unitAt(nc,nr))continue;
      const mc=movCost(nc,nr);
      if(mc>=99)continue;
      const nc2=cost+mc;
      if(nc2<=u.mov&&nc2<=u.cap){
        const key=`${nc},${nr}`;
        if(!visited.has(key)||visited.get(key)>nc2){
          visited.set(key,nc2);
          G.hilights.push({col:nc,row:nr,t:'move'});
          q.push({col:nc,row:nr,cost:nc2});
        }
      }
    }
  }
}

function doMove(u,col,row){
  const mc=movCost(col,row);
  u.col=col; u.row=row;
  u.cap=Math.max(0,u.cap-Math.ceil(mc));
  ch.publish('remote_move',{uid:u.id,col,row,cap:u.cap});
  G.hilights=[]; G.phase='SELECT';
  selUnit(u); showMsg('Unité déplacée');
  checkObj();
}

// ============================================================
// COMBAT
// ============================================================
function showAtkRange(u){
  G.hilights=[];
  for(let r=0;r<GH;r++) for(let c=0;c<GW;c++){
    const d=Math.abs(c-u.col)+Math.abs(r-u.row);
    if(d>0&&d<=u.rng){
      const t=unitAt(c,r);
      if(t&&t.fac!==u.fac) G.hilights.push({col:c,row:r,t:'atk'});
    }
  }
  if(!G.hilights.length) showMsg('Aucune cible à portée!');
}

function doAtk(atk,tgt){
  if(atk.cap<3){showMsg('PA insuffisants (3 requis)!');return;}
  const tv=terr(tgt.col,tgt.row);
  const cover=tv?Math.max(0,tv.cover):0;
  const roll=Math.floor(Math.random()*6)+1;
  const dmg=Math.max(1,atk.atk+roll-tgt.def-cover);
  atk.cap-=3; tgt.hp=Math.max(0,tgt.hp-dmg);
  ch.publish('remote_atk',{aid:atk.id,tid:tgt.id,dmg,roll,acap:atk.cap});
  showCombatPop(atk,tgt,dmg,roll,cover);
  if(tgt.hp<=0){tgt.alive=false;showMsg(`${tgt.name} DÉTRUIT!`);}
  G.hilights=[]; G.phase='SELECT'; selUnit(atk); updInfo(atk);
  checkVic();
}

function showCombatPop(atk,tgt,dmg,roll,cover){
  document.getElementById('cr').textContent=
    dmg>=6?`💥 CRITIQUE! -${dmg} HP`:`⚡ IMPACT! -${dmg} HP`;
  document.getElementById('cd').textContent=
    `${atk.name} [ATQ:${atk.atk}+🎲${roll}=${atk.atk+roll}] vs ${tgt.name} [DEF:${tgt.def}+Couv:${cover}=${tgt.def+cover}]`;
  const pop=document.getElementById('cpop');
  pop.classList.add('on');
  setTimeout(()=>pop.classList.remove('on'),2200);
}

// ============================================================
// FIN DE TOUR
// ============================================================
function endTurn(){
  if(!G.myTurn)return;
  G.myTurn=false; G.curTurn=G.curTurn==='UA'?'RU':'UA'; G.turnNum++;
  G.phase='SELECT'; G.selUnit=null; G.hilights=[];
  ch.publish('remote_end',{next:G.curTurn,tn:G.turnNum});
  for(const u of G.units) if(u.fac===G.curTurn) u.cap=u.map;
  updateHUD(); clearInfo();
  document.getElementById('end-btn').classList.add('off');
  document.getElementById('pbadge').textContent='ATTENTE ADVERSE...';
  showMsg('Tour terminé — adversaire en action...');
}

function onRMove(msg){
  const d=msg.data;
  const u=G.units.find(u=>u.id===d.uid); if(!u)return;
  u.col=d.col; u.row=d.row; u.cap=d.cap;
  showMsg(`${u.name} se déplace`);
}

function onRAtk(msg){
  const d=msg.data;
  const atk=G.units.find(u=>u.id===d.aid);
  const tgt=G.units.find(u=>u.id===d.tid);
  if(!atk||!tgt)return;
  atk.cap=d.acap; tgt.hp=Math.max(0,tgt.hp-d.dmg);
  if(tgt.hp<=0) tgt.alive=false;
  showCombatPop(atk,tgt,d.dmg,d.roll,0);
  checkVic();
}

function onREnd(msg){
  const d=msg.data;
  G.curTurn=d.next; G.turnNum=d.tn;
  G.myTurn=(G.myFac===G.curTurn);
  if(G.myTurn){
    for(const u of G.units) if(u.fac===G.myFac) u.cap=u.map;
    document.getElementById('end-btn').classList.remove('off');
    showMsg('🟢 À VOTRE TOUR!');
    document.getElementById('pbadge').textContent='VOTRE TOUR';
  }
  updateHUD(); clearInfo();
}

// ============================================================
// OBJECTIFS & VICTOIRE
// ============================================================
let objTimer={UA:0,RU:0};

function checkObj(){
  for(const obj of [{col:7,row:4},{col:7,row:7}]){
    const u=unitAt(obj.col,obj.row);
    if(u){ objTimer[u.fac]++; if(objTimer[u.fac]>=3) showMsg(`${u.fac} contrôle l'objectif!`); }
  }
}

function checkVic(){
  const ua=G.units.filter(u=>u.fac==='UA'&&u.alive).length;
  const ru=G.units.filter(u=>u.fac==='RU'&&u.alive).length;
  if(!ua) doVic('RU');
  else if(!ru) doVic('UA');
}

function doVic(winner){
  G.gameOver=true;
  const isMine=winner===G.myFac;
  document.getElementById('vtitle').textContent=isMine?'🏆 VICTOIRE':'💀 DÉFAITE';
  document.getElementById('vtitle').style.color=isMine?'#3aff3a':'#ff3333';
  document.getElementById('vsub').textContent=`${winner} REMPORTE LA BATAILLE`;
  document.getElementById('vwin').classList.add('on');
}

// ============================================================
// HUD / INFO
// ============================================================
function updateHUD(){
  const isUA=G.curTurn==='UA';
  const lbl=document.getElementById('faction-lbl');
  lbl.textContent=(G.myFac===G.curTurn?'▶ ':'')+G.curTurn;
  lbl.className=isUA?'ua-c':'ru-c';
  document.getElementById('turn-num').textContent='TOUR '+G.turnNum;
  if(G.myTurn) document.getElementById('end-btn').classList.remove('off');
}

function updInfo(u){
  document.getElementById('uname').textContent=u.name;
  document.getElementById('ustats').textContent=
    `ATQ:${u.atk}  DEF:${u.def}  POR:${u.rng}  MOV:${u.mov}`;
  const hp=(u.hp/u.mhp*100).toFixed(0);
  document.getElementById('uhpfill').style.width=hp+'%';
  document.getElementById('uhpfill').style.background=
    u.hp>u.mhp*.6?'#3aff3a':u.hp>u.mhp*.3?'#ffaa00':'#ff3333';
  document.getElementById('uap').textContent=`PA: ${u.cap}/${u.map}`;
}

function clearInfo(){
  G.selUnit=null; G.hilights=[];
  document.getElementById('uname').textContent='—';
  document.getElementById('ustats').textContent='Sélectionner une unité';
  document.getElementById('uhpfill').style.width='100%';
  document.getElementById('uap').textContent='PA: —';
  document.getElementById('bmove').classList.add('off');
  document.getElementById('batk').classList.add('off');
}

// ============================================================
// STATUS MSG
// ============================================================
let _smt=null;
function showMsg(txt,dur=2800){
  const el=document.getElementById('smsg');
  el.textContent=txt; el.classList.add('on');
  clearTimeout(_smt); _smt=setTimeout(()=>el.classList.remove('on'),dur);
}
</script>
